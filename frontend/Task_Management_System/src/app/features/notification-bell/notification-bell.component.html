<div class="bell-wrapper">
    <button class="bell-btn" (click)="toggle()" [class.has-notifs]="signalR.unreadCount() > 0">
        <i class="fa-solid fa-bell"></i>
        @if (signalR.unreadCount() > 0) {
        <span class="badge">{{ signalR.unreadCount() > 99 ? '99+' : signalR.unreadCount() }}</span>
        }
    </button>

    @if (open) {
    <div class="dropdown">
        <div class="dropdown-header">
            <span>Notifications</span>
            <div class="header-actions">
                <button class="action-btn" (click)="signalR.markAllRead()">Mark all read</button>
                <button class="action-btn" (click)="signalR.clearAll()">Clear</button>
            </div>
        </div>

        <div class="notif-list">
            @for (n of signalR.notifications(); track n.id) {
            <div class="notif-item" [class.unread]="!n.read" (click)="onNotifClick(n)">
                <i class="notif-icon" [ngClass]="getIcon(n.type)"></i>
                <div class="notif-body">
                    <p class="notif-msg">{{ n.message }}</p>
                    <span class="notif-time">{{ timeAgo(n.timestamp) }}</span>
                </div>
                @if (!n.read) {
                <span class="unread-dot"></span>
                }
            </div>
            } @empty {
            <div class="empty-notifs">
                <i class="fa-solid fa-bell-slash"></i>
                <p>No notifications yet</p>
            </div>
            }
        </div>

        <div class="dropdown-footer">
            <span class="conn-status" [class]="'conn-' + signalR.connectionState().toLowerCase()">
                ● {{ signalR.connectionState() }}
            </span>
        </div>
    </div>
    }
</div>
